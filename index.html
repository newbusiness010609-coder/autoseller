<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoSeller AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 100%;
  max-width: 600px;
}

h1 {
  text-align: center;
}

input, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #4facfe;
  color: white;
  font-size: 16px;
}

#result {
  margin-top: 20px;
  padding: 15px;
  background: #f5f5f5;
  border-radius: 10px;
  white-space: pre-line;
  line-height: 1.6;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN BOX -->
<div id="authBox" class="container">
  <h1>Login / Sign Up</h1>

  <input type="email" id="authEmail" placeholder="Email"><br>
  <input type="password" id="authPassword" placeholder="Password"><br>

  <button onclick="signUp()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- 🚀 APP -->
<div id="app" style="display:none;">
  <div class="container">
    <h1>AutoSeller AI</h1>

    <input type="email" id="email" placeholder="Enter your email" required>
    <input type="file" id="image">
    <textarea id="instructions" placeholder="Optional instructions"></textarea>

    <button onclick="send()">Analyze 🚀</button>

    <div id="result">Result will appear here...</div>
  </div>
</div>

<script>
async function send() {
  const file = document.getElementById("image").files[0];
  const email = document.getElementById("email").value;
  const instructions = document.getElementById("instructions").value;

  if (!email) {
    document.getElementById("result").innerText = "Enter your email.";
    return;
  }

  if (!file) {
    document.getElementById("result").innerText = "Please upload an image.";
    return;
  }

  const formData = new FormData();
  formData.append("email", email);
  formData.append("image", file);
  formData.append("instructions", instructions);

  document.getElementById("result").innerText = "Analyzing...";

  try {
    const res = await fetch("/analyze", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    document.getElementById("result").innerText = data.result;

  } catch (err) {
    document.getElementById("result").innerText = "Something went wrong.";
  }
}
</script>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBUswfX1bWIOhoPyqvwh9Pr6BBpAG8HrzM",
  authDomain: "auto-seller-ai.firebaseapp.com",
  projectId: "auto-seller-ai",
  storageBucket: "auto-seller-ai.firebasestorage.app",
  messagingSenderId: "1017318920085",
  appId: "1:1017318920085:web:2c143da652c1a2c149709c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 🔐 SIGN UP
function signUp() {
  const email = document.getElementById("authEmail").value;
  const password = document.getElementById("authPassword").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      alert("Account created ✅");
    })
    .catch(err => {
      alert(err.message);
    });
}

// 🔐 LOGIN
function login() {
  const email = document.getElementById("authEmail").value;
  const password = document.getElementById("authPassword").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("Logged in 🚀");
    })
    .catch(err => {
      alert(err.message);
    });
}

// 🔥 AUTO SWITCH UI
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("authBox").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    document.getElementById("authBox").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});
</script>

</body>
</html>
