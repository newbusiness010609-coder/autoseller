<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoSeller AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 100%;
  max-width: 600px;
}

h1 {
  text-align: center;
}

input, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #4facfe;
  color: white;
  font-size: 16px;
}

#result {
  margin-top: 20px;
  padding: 15px;
  background: #f5f5f5;
  border-radius: 10px;
  white-space: pre-line;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">
  <h1>AutoSeller AI</h1>

  <input type="file" id="image">
  <textarea id="instructions" placeholder="Optional instructions"></textarea>

  <button onclick="send()">Analyze 🚀</button>

  <div id="result">Result will appear here...</div>
</div>

<script>
function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>") // bold
    .replace(/\n/g, "<br>"); // spacing
}

async function send() {
  const file = document.getElementById("image").files[0];

  if (!file) {
    document.getElementById("result").innerText = "Upload an image.";
    return;
  }

  const formData = new FormData();
  formData.append("image", file);

  document.getElementById("result").innerHTML = "Analyzing... ⏳";

  try {
    const res = await fetch("/analyze", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    document.getElementById("result").innerHTML = formatText(data.result);

  } catch {
    document.getElementById("result").innerText = "Error.";
  }
}
</script>

</body>
</html>
