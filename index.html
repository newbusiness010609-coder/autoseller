<!DOCTYPE html>
<html>
<head>
  <title>AutoSeller AI</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #eef2f3, #dfe9f3);
      text-align: center;
      padding: 40px;
      color: #222;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 30px;
      color: #555;
    }

    input, textarea {
      width: 60%;
      padding: 12px;
      margin: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      background: #111;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    #result {
      margin-top: 30px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 60%;
      margin-left: auto;
      margin-right: auto;
      white-space: pre-line;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<h1>AutoSeller AI</h1>
<p>Upload image → get structured listing</p>

<input type="file" id="image">
<br>

<textarea id="instructions" rows="5" placeholder="Write categories (e.g. Title, Description, Price, Target Audience...)"></textarea>
<br>

<button onclick="send()">Analyze</button>

<div id="result">Result will appear here...</div>

<script>
async function send() {
  const file = document.getElementById("image").files[0];
  const instructions = document.getElementById("instructions").value;

  if (!file) {
    document.getElementById("result").innerText = "Please upload an image.";
    return;
  }

  const formData = new FormData();
  formData.append("image", file);
  formData.append("instructions", instructions);

  document.getElementById("result").innerText = "Analyzing...";

  try {
    const res = await fetch("/analyze", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    document.getElementById("result").innerText = data.result;

  } catch (err) {
    document.getElementById("result").innerText = "Something went wrong.";
  }
}
</script>

</body>
</html>
