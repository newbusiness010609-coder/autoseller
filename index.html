<!DOCTYPE html>
<html>
<head>
  <title>AutoSeller AI</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 60px;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      color: #111;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      background: #111;
      color: white;
      border-radius: 8px;
      transition: 0.2s;
    }

    button:hover {
      background: #333;
    }

    #result {
      margin-top: 40px;
      padding: 20px;
      background: white;
      border-radius: 10px;
      width: 60%;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      white-space: pre-line;
    }
  </style>
</head>
<body>

  <h1>AutoSeller AI</h1>
  <p>Generate powerful product listings instantly</p>

  <button onclick="generate()">Generate Listing</button>

  <div id="result">Your AI result will appear here...</div>

  <script>
    async function generate() {
      document.getElementById("result").innerText = "Generating...";

      try {
        const res = await fetch("https://autoseller-b.onrender.com/generate", {
          method: "POST"
        });

        const data = await res.json();

        if (data.choices) {
          document.getElementById("result").innerText =
            data.choices[0].message.content;
        } else {
          document.getElementById("result").innerText =
            "Error: " + JSON.stringify(data);
        }

      } catch (err) {
        document.getElementById("result").innerText = "Request failed";
      }
    }
  </script>

</body>
</html>
