<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoSeller AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 100%;
  max-width: 600px;
}

h1 { text-align: center; }

input, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #4facfe;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.google-btn {
  background: #fff;
  color: #444;
  border: 1px solid #ccc;
}

#authMessage {
  margin-top: 10px;
  text-align: center;
  font-size: 14px;
}

#result {
  margin-top: 20px;
  padding: 15px;
  background: #f5f5f5;
  border-radius: 10px;
  white-space: pre-line;
}
</style>
</head>

<body>

<div id="authBox" class="container">
  <h1>Login / Sign Up</h1>

  <input type="email" id="authEmail" placeholder="Email">
  <input type="password" id="authPassword" placeholder="Password">

  <button onclick="signUp()">Sign Up</button>
  <button onclick="login()">Login</button>

  <button class="google-btn" onclick="googleLogin()">Continue with Google</button>

  <div id="authMessage"></div>
</div>

<div id="app" style="display:none;">
  <div class="container">
    <h1>AutoSeller AI</h1>

    <input type="email" id="email" placeholder="Enter your email">
    <input type="file" id="image">
    <textarea id="instructions" placeholder="Optional instructions"></textarea>

    <button onclick="send()">Analyze 🚀</button>

    <div id="result">Result will appear here...</div>
  </div>
</div>

<script>
function showMessage(msg, color="red") {
  const box = document.getElementById("authMessage");
  box.innerText = msg;
  box.style.color = color;
}

function signUp() {
  const email = authEmail.value;
  const password = authPassword.value;

  if (!email || !password) return showMessage("Enter email & password");

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => showMessage("Account created ✅", "green"))
    .catch(err => showMessage(err.message));
}

function login() {
  const email = authEmail.value;
  const password = authPassword.value;

  if (!email || !password) return showMessage("Enter email & password");

  auth.signInWithEmailAndPassword(email, password)
    .then(() => showMessage("Logged in 🚀", "green"))
    .catch(err => showMessage("Wrong email or password"));
}

function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(() => showMessage("Logged in with Google ✅", "green"))
    .catch(err => showMessage("Google login failed"));
}

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("authBox").style.display = "none";
    document.getElementById("app").style.display = "block";

    // auto-fill email
    document.getElementById("email").value = user.email;
  } else {
    document.getElementById("authBox").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

async function send() {
  const file = document.getElementById("image").files[0];
  const email = document.getElementById("email").value;
  const instructions = document.getElementById("instructions").value;

  if (!file) {
    document.getElementById("result").innerText = "Upload image.";
    return;
  }

  const formData = new FormData();
  formData.append("email", email);
  formData.append("image", file);
  formData.append("instructions", instructions);

  document.getElementById("result").innerText = "Analyzing...";

  const res = await fetch("/analyze", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  document.getElementById("result").innerText = data.result;
}
</script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

</body>
</html>
