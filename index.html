<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoSeller AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      margin-bottom: 25px;
    }

    input[type="file"] {
      margin-bottom: 15px;
      width: 100%;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
      resize: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }

    #result {
      margin-top: 25px;
      padding: 20px;
      border-radius: 10px;
      background: #f9f9f9;
      text-align: left;
      white-space: pre-line;
      font-size: 15px;
      line-height: 1.5;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
    }

    .loading {
      text-align: center;
      font-weight: bold;
      color: #666;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>AutoSeller AI</h1>
  <p>Upload an image → get a smart product listing 🚀</p>

  <input type="file" id="image">

  <textarea id="instructions" rows="4" placeholder="Optional: add categories (Title, Price, Target Audience...)"></textarea>

  <button onclick="send()">Analyze 🚀</button>

  <div id="result">Results will appear here...</div>
</div>

<script>
async function send() {
  const file = document.getElementById("image").files[0];
  const instructions = document.getElementById("instructions").value;

  if (!file) {
    document.getElementById("result").innerText = "Please upload an image.";
    return;
  }

  const formData = new FormData();
  formData.append("image", file);
  formData.append("instructions", instructions);

  document.getElementById("result").innerHTML = "<div class='loading'>Analyzing... ⏳</div>";

  try {
    const res = await fetch("/analyze", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    document.getElementById("result").innerText = data.result;

  } catch (err) {
    document.getElementById("result").innerText = "Something went wrong.";
  }
}
</script>

</body>
</html>
