<!DOCTYPE html>
<html>
<head>
  <title>AutoSeller AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 50px;
    }

    .card {
      background: white;
      color: black;
      width: 60%;
      margin: 30px auto;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 0.6s ease;
    }

    input, textarea {
      width: 90%;
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #result {
      white-space: pre-line;
      text-align: left;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<h1>AutoSeller AI</h1>

<div class="card">
  <h2>Upload Product</h2>
  <input type="file" id="image">
  <textarea id="instructions" placeholder="Optional extra instructions..."></textarea>
  <button onclick="send()">Analyze 🚀</button>
</div>

<div class="card">
  <h2>AI Results</h2>
  <div id="result">Your AI output will appear here...</div>
</div>

<script>
async function send() {
  const file = document.getElementById("image").files[0];
  const instructions = document.getElementById("instructions").value;

  if (!file) {
    document.getElementById("result").innerText = "Upload an image first.";
    return;
  }

  const formData = new FormData();
  formData.append("image", file);
  formData.append("instructions", instructions);

  document.getElementById("result").innerText = "Analyzing... ⏳";

  try {
    const res = await fetch("/analyze", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    document.getElementById("result").innerText = data.result;

  } catch {
    document.getElementById("result").innerText = "Request failed.";
  }
}
</script>

</body>
</html>
