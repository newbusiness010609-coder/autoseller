<script>
const firebaseConfig = {
  apiKey: "AIzaSyBUswfX1bWIOhoPyqvwh9Pr6BBpAG8HrzM",
  authDomain: "auto-seller-ai.firebaseapp.com",
  projectId: "auto-seller-ai",
  storageBucket: "auto-seller-ai.firebasestorage.app",
  messagingSenderId: "1017318920085",
  appId: "1:1017318920085:web:2c143da652c1a2c149709c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 🧠 SIMPLE MESSAGE
function showMessage(msg, color="red") {
  const box = document.getElementById("authMessage");
  box.innerText = msg;
  box.style.color = color;
}

// 🔐 SIGNUP
function signUp() {
  const email = authEmail.value;
  const password = authPassword.value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => showMessage("Account created ✅", "green"))
    .catch(err => showMessage(err.message));
}

// 🔐 LOGIN
function login() {
  const email = authEmail.value;
  const password = authPassword.value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => showMessage("Logged in 🚀", "green"))
    .catch(() => showMessage("Wrong email or password"));
}

// 🔐 GOOGLE (FIXED)
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(() => showMessage("Google login success ✅", "green"))
    .catch(err => {
      console.log(err);
      showMessage("Google blocked / not allowed");
    });
}

// 🔥 UI SWITCH (FIXED)
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("authBox").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    document.getElementById("authBox").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

// 🚀 SEND (NO AUTO EMAIL WEIRDNESS)
async function send() {
  const file = document.getElementById("image").files[0];
  const instructions = document.getElementById("instructions").value;

  if (!file) {
    document.getElementById("result").innerText = "Upload image.";
    return;
  }

  const user = auth.currentUser;

  if (!user) {
    document.getElementById("result").innerText = "Please login again.";
    return;
  }

  const formData = new FormData();
  formData.append("email", user.email);
  formData.append("image", file);
  formData.append("instructions", instructions);

  document.getElementById("result").innerText = "Analyzing...";

  const res = await fetch("/analyze", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  document.getElementById("result").innerText = data.result;
}
</script>

</body>
</html>
