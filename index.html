<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoSeller AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  margin-top: 20px;
  border-radius: 15px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  margin-top: 15px;
  padding: 15px;
  width: 100%;
  background: linear-gradient(135deg, #ff7e5f, #feb47b);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
}

.block {
  margin-bottom: 20px;
  padding: 15px;
  background: #f8f8f8;
  border-radius: 10px;
}

.block h3 {
  margin-bottom: 10px;
}

.score {
  background: #ddd;
  border-radius: 20px;
  height: 20px;
  margin: 5px 0;
  position: relative;
}

.bar {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  border-radius: 20px;
}

.score span {
  position: absolute;
  right: 10px;
  top: 0;
  font-size: 12px;
  line-height: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>AutoSeller AI</h1>

  <div class="card">
    <input type="file" id="image">
    <button onclick="send()">Analyze 🚀</button>
  </div>

  <div class="card" id="result">
    Results will appear here...
  </div>
</div>

<script>
function formatResult(text) {
  const sections = text.split("===");
  let html = "";

  sections.forEach(sec => {
    sec = sec.trim();
    if (!sec) return;

    const title = sec.split("\n")[0];
    const content = sec.replace(title, "").trim();

    html += `
      <div class="block">
        <h3>${title}</h3>
        <div>${formatContent(content)}</div>
      </div>
    `;
  });

  return html;
}

function formatContent(content) {
  content = content.replace(/(Title:|Price:|Audience:|Angle:|Demand:|Profit:|Competition:|Virality:)/g, "<strong>$1</strong>");

  content = content.replace(/(\d+)\/10/g, (match, num) => {
    return `
      <div class="score">
        <div class="bar" style="width:${num * 10}%"></div>
        <span>${num}/10</span>
      </div>
    `;
  });

  return content.replace(/\n/g, "<br>");
}

async function send() {
  const file = document.getElementById("image").files[0];

  if (!file) {
    document.getElementById("result").innerText = "Upload an image.";
    return;
  }

  const formData = new FormData();
  formData.append("image", file);

  document.getElementById("result").innerText = "Analyzing...";

  try {
    const res = await fetch("/analyze", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    document.getElementById("result").innerHTML = formatResult(data.result);

  } catch {
    document.getElementById("result").innerText = "Error.";
  }
}
</script>

</body>
</html>

<body>

<h1>AutoSeller AI</h1>

<div class="card">
  <h2>Upload Product</h2>
  <input type="file" id="image">
  <textarea id="instructions" placeholder="Optional extra instructions..."></textarea>
  <button onclick="send()">Analyze 🚀</button>
</div>

<div class="card">
  <h2>AI Results</h2>
  <div id="result">Your AI output will appear here...</div>
</div>

<script>
async function send() {
  const file = document.getElementById("image").files[0];
  const instructions = document.getElementById("instructions").value;

  if (!file) {
    document.getElementById("result").innerText = "Upload an image first.";
    return;
  }

  const formData = new FormData();
  formData.append("image", file);
  formData.append("instructions", instructions);

  document.getElementById("result").innerText = "Analyzing... ⏳";

  try {
    const res = await fetch("/analyze", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    document.getElementById("result").innerText = data.result;

  } catch {
    document.getElementById("result").innerText = "Request failed.";
  }
}
</script>

</body>
</html>
