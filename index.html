<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoSeller AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 100%;
  max-width: 600px;
}

h1 {
  text-align: center;
}

input, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #4facfe;
  color: white;
  font-size: 16px;
}

#result {
  margin-top: 20px;
  padding: 15px;
  background: #f5f5f5;
  border-radius: 10px;
  white-space: pre-line;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">
  <h1>AutoSeller AI</h1>
<input type="email" id="email" placeholder="Enter your email" required>
  <input type="file" id="image">
  <textarea id="instructions" placeholder="Optional instructions"></textarea>

  <button onclick="send()">Analyze 🚀</button>

  <div id="result">Result will appear here...</div>
</div>

<script>
async function send() {
  const file = document.getElementById("image").files[0];
  const email = document.getElementById("email").value;
  const instructions = document.getElementById("instructions").value;

  if (!email) {
    document.getElementById("result").innerText = "Enter your email.";
    return;
  }

  if (!file) {
    document.getElementById("result").innerText = "Please upload an image.";
    return;
  }

  const formData = new FormData();
  formData.append("email", email); // 🔥 THIS WAS MISSING
  formData.append("image", file);
  formData.append("instructions", instructions);

  document.getElementById("result").innerText = "Analyzing...";

  try {
    const res = await fetch("/analyze", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    document.getElementById("result").innerText = data.result;

  } catch (err) {
    document.getElementById("result").innerText = "Something went wrong.";
  }
}
</script>

</body>
</html>
